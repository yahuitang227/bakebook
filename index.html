<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bake Book</title>
<meta name="description" content="My personal baking recipe notebook">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bake Book">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#FFFFFF; --panel:#F6F6F3; --ink:#17150F; --ink2:#6F6B60;
  --line:#E7E5DE; --accent:#E8600A; --accent-soft:#FDEEE3; --danger:#B3362A;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang TC","Microsoft JhengHei","Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;
  padding-bottom:env(safe-area-inset-bottom)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--sans)}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.wrap{max-width:720px;margin:0 auto;padding:0 20px 96px}
.ic{width:17px;height:17px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;flex:none}

/* header */
header.app{padding:calc(20px + env(safe-area-inset-top)) 20px 0;max-width:720px;margin:0 auto}
header.app h1{font-size:24px;font-weight:800;letter-spacing:-.4px;margin:0;cursor:pointer;display:inline-block}
header.app .sub{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--ink2);margin-top:2px}

/* search + chips */
.search{margin:18px 0 0;display:flex;align-items:center;gap:10px;background:var(--panel);border-radius:12px;padding:2px 14px;color:var(--ink2)}
.search input{flex:1;border:none;background:transparent;padding:11px 0;font-size:16px;color:var(--ink);min-width:0}
.search input::placeholder{color:var(--ink2)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 0 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);color:var(--ink2);background:var(--bg);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* cards */
.cards{display:grid;grid-template-columns:1fr;gap:14px;margin-top:10px}
@media(min-width:560px){.cards{grid-template-columns:1fr 1fr}}
.card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--bg);cursor:pointer;transition:transform .12s ease}
.card:active{transform:scale(.985)}
.card .photo{height:150px;background:linear-gradient(160deg,#F3F1EA,#E9E6DC);display:flex;align-items:center;justify-content:center;color:#B9B39F}
.card .photo img{width:100%;height:100%;object-fit:cover;display:block}
.card .photo .ic{width:34px;height:34px}
.card .b{padding:13px 15px 15px}
.card h3{margin:0;font-size:16.5px;font-weight:700;letter-spacing:-.2px;line-height:1.35}
.meta{display:flex;flex-wrap:wrap;gap:6px 14px;color:var(--ink2);font-size:12.5px;margin-top:7px;align-items:center}
.meta span{display:inline-flex;align-items:center;gap:5px}
.tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:600;letter-spacing:.3px;padding:4px 10px;border-radius:6px;background:var(--panel);color:var(--ink2)}
.tag.via{background:var(--accent-soft);color:var(--accent)}
.empty{color:var(--ink2);text-align:center;padding:44px 10px;font-size:14.5px}
.credit{font-size:12px;color:var(--ink2);text-align:center;margin:30px 0 8px}

/* detail */
.back{display:inline-flex;align-items:center;gap:6px;margin:18px 0 0;background:none;border:none;color:var(--ink2);font-size:14px;cursor:pointer;padding:6px 6px 6px 0}
.hero{border-radius:16px;overflow:hidden;margin-top:14px;background:var(--panel)}
.hero img{width:100%;display:block;max-height:320px;object-fit:cover}
h1.rtitle{font-size:23px;font-weight:800;letter-spacing:-.3px;line-height:1.25;margin:18px 0 0}
.alt{color:var(--ink2);font-size:14px;margin-top:3px}
.src{color:var(--ink2);font-size:12.5px;margin-top:8px}
.btns{display:flex;gap:10px;margin-top:16px}
.btnlink{flex:1;text-align:center;font-size:13.5px;font-weight:600;padding:11px 0;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;gap:7px;color:var(--ink)}
.btnlink.dark{background:var(--ink);color:#fff}
.btnlink.dark:hover{text-decoration:none}
.btnlink.line{border:1px solid var(--line)}
.banner{margin-top:16px;background:var(--accent-soft);border-radius:12px;padding:12px 14px;font-size:13.5px}
.banner b{display:block;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.times{display:flex;margin-top:16px;background:var(--panel);border-radius:12px;padding:12px 0}
.times div{flex:1;text-align:center}
.times .l{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink2)}
.times .v{font-size:16px;font-weight:700;margin-top:2px}

section.sec{margin-top:26px}
section.sec>h2{font-size:12px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink2);padding-bottom:8px;border-bottom:1px solid var(--line);margin:0 0 4px;font-weight:600;display:flex;align-items:center;gap:10px}
.quote{font-size:13.5px;color:var(--ink2);border-left:2px solid var(--line);padding-left:12px;margin:10px 0 2px;line-height:1.6}
.kv{display:flex;flex-wrap:wrap;gap:4px 22px;font-size:14px;margin-top:10px}
.kv div b{display:block;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink2);font-weight:600}
.hint{font-size:12.5px;color:var(--ink2);margin:10px 0 0;line-height:1.6}
.inferred{font-size:12px;color:var(--ink2);font-style:italic}

/* video */
.vid{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;background:#000;margin-top:12px}
.vid img{width:100%;display:block;opacity:.85}
.vid .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.vid .play span{background:rgba(23,21,15,.88);color:#fff;border-radius:999px;padding:11px 20px;font-size:14px;display:inline-flex;align-items:center;gap:8px}

/* converter */
.conv{background:var(--panel);border-radius:14px;padding:16px;margin-top:12px}
.panviz{display:flex;align-items:center;justify-content:center;gap:18px;padding:2px 0 14px}
.ratio{text-align:center;min-width:76px}
.ratio .n{font-size:22px;font-weight:800;color:var(--accent)}
.ratio .l{font-size:9.5px;letter-spacing:1.5px;color:var(--ink2);text-transform:uppercase}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fld label{display:block;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink2);margin:0 0 3px 1px;font-weight:600}
.fld select,.fld input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font-size:14.5px;background:#fff;color:var(--ink)}
.cbtn{grid-column:1/3;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 0;font-weight:700;font-size:14px;cursor:pointer}
.adv{margin-top:12px;font-size:12.5px;color:var(--ink2);line-height:1.6}
.adv b{color:var(--ink)}
.adv ul{margin:4px 0 0;padding-left:18px}
.adv li{margin:3px 0}
.textbtn{background:none;border:none;color:var(--accent);font-size:12.5px;cursor:pointer;padding:6px 0 0;text-decoration:underline}

/* ingredients */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin:12px 0 2px;font-size:12.5px}
.seg button{padding:7px 14px;color:var(--ink2);background:#fff;border:none;cursor:pointer}
.seg button.on{background:var(--ink);color:#fff;font-weight:600}
.scaledpill{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:6px;padding:3px 8px;letter-spacing:.3px;text-transform:none}
.grouph{font-size:12px;font-weight:700;color:var(--accent);margin:14px 0 0;letter-spacing:.5px}
.ing{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px;align-items:baseline}
.ing:last-child{border-bottom:none}
.ing .a{min-width:88px;font-weight:700;font-variant-numeric:tabular-nums}
.ing .a small{display:block;font-weight:500;color:var(--accent);font-size:11.5px}
.ing .n{flex:1}
.ing .n em{color:var(--ink2);font-size:12.5px;font-style:normal}

/* steps */
ol.steps{margin:14px 0 0;padding:0;list-style:none;counter-reset:st}
ol.steps li{position:relative;padding:0 0 20px 42px;counter-increment:st;font-size:14.5px;line-height:1.6}
ol.steps li::before{content:counter(st);position:absolute;left:0;top:0;width:28px;height:28px;border-radius:50%;
  border:1px solid var(--line);color:var(--ink);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px;background:#fff}
ol.steps li::after{content:"";position:absolute;left:14px;top:33px;bottom:6px;width:1px;background:var(--line)}
ol.steps li:last-child{padding-bottom:4px}
ol.steps li:last-child::after{display:none}
ol.steps img{width:100%;max-width:420px;border-radius:12px;margin-top:10px;display:block;border:1px solid var(--line)}

/* photo slots */
.pslot{margin-top:10px;max-width:420px}
.pslot img{width:100%;border-radius:12px;display:block;border:1px solid var(--line)}
.pslot .row{display:flex;gap:8px;margin-top:6px}
.addphoto{display:inline-flex;align-items:center;gap:7px;border:1px dashed var(--line);background:var(--panel);color:var(--ink2);
  border-radius:11px;padding:10px 14px;font-size:12.5px;cursor:pointer;font-weight:600}
.addphoto:hover{border-color:var(--accent);color:var(--accent)}
.mine{font-size:10.5px;font-weight:700;letter-spacing:.4px;color:var(--accent);background:var(--accent-soft);border-radius:6px;padding:3px 8px;display:inline-block;margin-top:6px}
.hero .addphoto{width:100%;justify-content:center;padding:26px 0;border-radius:16px}
.meter{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:8px}
.meter div{height:100%;background:var(--accent)}

/* tips */
.tip{padding:13px 0;border-bottom:1px solid var(--line)}
.tip:last-child{border-bottom:none}
.tip .txt{font-size:14px;line-height:1.6}
.tip .who{font-size:12px;color:var(--ink2);margin-top:7px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tip .topic{background:var(--panel);color:var(--ink2);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:600;letter-spacing:.3px}
.tip .adds{background:var(--accent-soft);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:700}

/* bake log */
.log{padding:13px 0;border-bottom:1px solid var(--line)}
.log .d{font-size:12px;color:var(--ink2);display:flex;justify-content:space-between;gap:10px}
.log .stars{color:var(--accent);margin-top:3px;font-size:13px;letter-spacing:2px}
.log p{font-size:13.5px;margin:7px 0 0}
.log p b{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink2);display:block;font-weight:600}
.logform{margin-top:16px}
.logform label{display:block;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink2);font-weight:600;margin:12px 0 4px}
.logform input,.logform textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14.5px;background:#fff;color:var(--ink);font-family:var(--sans)}
.logform textarea{min-height:58px;resize:vertical}
.starpick{font-size:24px;letter-spacing:6px;cursor:pointer;user-select:none;color:#DAD7CE;margin-top:2px}
.starpick .lit{color:var(--accent)}
.btn{background:var(--ink);color:#fff;border:none;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px}
.btn.accent{background:var(--accent)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.textbtn.danger{color:var(--danger)}

/* add / backup */
.mono-ta{width:100%;min-height:180px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);margin-top:12px}
.okmsg{color:#2E6B2A;font-size:13.5px;margin:10px 0 0}
.errmsg{color:var(--danger);font-size:13.5px;margin:10px 0 0}
details.protocol{margin-top:16px}
details.protocol summary{cursor:pointer;font-weight:600;font-size:14px}
pre.tpl{white-space:pre-wrap;font-size:12px;background:var(--panel);border-radius:10px;padding:12px;max-height:280px;overflow:auto;line-height:1.5}
input[type=file]{font-size:13.5px;margin-top:10px}

/* bottom nav */
nav.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav.bottom .inner{max-width:720px;margin:0 auto;display:flex}
nav.bottom button{flex:1;background:none;border:none;padding:9px 4px 8px;font-size:11.5px;color:var(--ink2);cursor:pointer}
nav.bottom button .ic{display:block;margin:0 auto 3px;width:20px;height:20px}
nav.bottom button.on{color:var(--ink);font-weight:700}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}
</style>
</head>
<body>
<header class="app">
  <h1 onclick="go('#/')">Bake Book</h1>
  <div class="sub">My recipe notebook</div>
</header>

<div class="wrap" id="view"></div>

<nav class="bottom"><div class="inner">
  <button id="nav-home" onclick="go('#/')"><svg class="ic" viewBox="0 0 24 24"><path d="M4 5a2 2 0 012-2h13v18H6a2 2 0 00-2 2z"/><path d="M4 19a2 2 0 012-2h13"/></svg>Recipes</button>
  <button id="nav-add" onclick="go('#/add')"><svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add</button>
  <button id="nav-backup" onclick="go('#/backup')"><svg class="ic" viewBox="0 0 24 24"><path d="M12 3v12M12 15l4-4M12 15l-4-4"/><path d="M5 21h14"/></svg>Backup</button>
</div></nav>

<script src="recipes-data.js"></script>
<script>
/* ================= icons ================= */
const I={
  clock:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  pan:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>',
  play:'<svg class="ic" viewBox="0 0 24 24"><path d="M7 5l12 7-12 7z"/></svg>',
  ext:'<svg class="ic" viewBox="0 0 24 24"><path d="M14 4h6v6"/><path d="M20 4L10 14"/><path d="M20 14v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1h5"/></svg>',
  backc:'<svg class="ic" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>',
  search:'<svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>',
  log:'<svg class="ic" viewBox="0 0 24 24"><path d="M5 4h14v16H5z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>',
  cake:'<svg class="ic" viewBox="0 0 24 24"><path d="M4 14h16v5a1 1 0 01-1 1H5a1 1 0 01-1-1z"/><path d="M6 14v-3a6 6 0 0112 0v3"/><path d="M12 4v2"/></svg>',
  cam:'<svg class="ic" viewBox="0 0 24 24"><path d="M3 8a2 2 0 012-2h2.5l1.2-2h6.6L16.5 6H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><circle cx="12" cy="12.5" r="3.5"/></svg>',
  trash:'<svg class="ic" viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>'
};
/* ================= storage ================= */
const LS_RECIPES='bakebook.userRecipes', LS_LOGS='bakebook.bakeLogs', LS_PHOTOS='bakebook.photos';
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){
  alert('Could not save. Device storage may be full. Try Backup, Download backup, then remove some photos.');return false}};
let userRecipes=load(LS_RECIPES,[]);
let bakeLogs=load(LS_LOGS,{});
/* photos: { "recipeId|slot": dataURL }  slot = "cover" or "step-3" */
let photos=load(LS_PHOTOS,{});

const pkey=(id,slot)=>id+'|'+slot;
const myPhoto=(id,slot)=>photos[pkey(id,slot)]||null;

/* Pick an image, downscale to max 1200px, store as JPEG data URL */
function pickPhoto(id,slot){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1200;
        let {width:w,height:h}=img;
        if(Math.max(w,h)>MAX){const s=MAX/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s);}
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        const data=cv.toDataURL('image/jpeg',0.82);
        const key=pkey(id,slot);
        photos[key]=data;
        if(save(LS_PHOTOS,photos)){ render(); }
        else { delete photos[key]; }
      };
      img.onerror=()=>alert('That file could not be read as an image.');
      img.src=rd.result;
    };
    rd.readAsDataURL(f);
  };
  inp.click();
}
function removePhoto(id,slot){
  if(!confirm('Remove this photo?'))return;
  delete photos[pkey(id,slot)]; save(LS_PHOTOS,photos); render();
}
function photoBytes(){
  let n=0; for(const k in photos) n+=photos[k].length*0.75; // base64 overhead
  return n;
}
const fmtBytes=b=> b>1048576? (b/1048576).toFixed(1)+' MB' : Math.round(b/1024)+' KB';

/* Renders an image slot: my photo wins, else try the original URL,
   and if that fails (hotlink blocked / dead link) fall back to the Add photo button. */
function photoSlot(id,slot,originalUrl,alt){
  const mine=myPhoto(id,slot);
  const addBtn=`<button class="addphoto" onclick="event.stopPropagation();pickPhoto('${id}','${slot}')">${I.cam}Add photo</button>`;
  if(mine){
    return `<div class="pslot"><img src="${mine}" alt="${esc(alt||'')}">
      <div class="row"><button class="addphoto" onclick="pickPhoto('${id}','${slot}')">${I.cam}Replace</button>
      <button class="addphoto" onclick="removePhoto('${id}','${slot}')">${I.trash}Remove</button></div>
      <span class="mine">Your photo</span></div>`;
  }
  if(originalUrl){
    const fid='ph_'+Math.random().toString(36).slice(2,9);
    return `<div class="pslot" id="${fid}">
      <img src="${esc(originalUrl)}" alt="${esc(alt||'')}" loading="lazy"
        onerror="photoFailed('${fid}','${id}','${slot}')">
      <div class="row">${addBtn}</div></div>`;
  }
  return `<div class="pslot">${addBtn}</div>`;
}
/* Called when an original image 404s or is blocked by the source site. */
function photoFailed(fid,id,slot){
  const el=document.getElementById(fid); if(!el)return;
  el.innerHTML=`<button class="addphoto" onclick="pickPhoto('${id}','${slot}')">${I.cam}Add photo</button>
    <span class="mine" style="background:var(--panel);color:var(--ink2)">Original photo unavailable</span>`;
}

function allRecipes(){
  const seen=new Set(); const out=[];
  const seed=(typeof SEED_RECIPES!=='undefined')?SEED_RECIPES:[];
  for(const r of [...userRecipes,...seed]){ if(!seen.has(r.id)){seen.add(r.id);out.push(r);} }
  return out;
}
function effectiveCategories(r){
  const set=new Set(r.categories||[]);
  (r.tips||[]).forEach(t=>(t.affects_categories||[]).forEach(c=>set.add(c)));
  return [...set];
}
const CAT_LABELS={'sponge-cake':'Sponge cake','cookies':'Cookies','chocolate-cake':'Chocolate cake','buttercream':'Buttercream','chiffon-cake':'Chiffon cake','cupcakes':'Cupcakes'};
const catLabel=c=>CAT_LABELS[c]||c;

/* ================= units ================= */
const CUP_ML={'US':240,'UK':250,'TW-rice-cup':180};
const UNIT_ML={'tsp':5,'tbsp':15};
function fmtNum(n){
  if(n==null||isNaN(n))return '';
  if(n>=100)return String(Math.round(n));
  if(n>=10)return String(Math.round(n*10)/10).replace(/\.0$/,'');
  const r=Math.round(n*100)/100; return String(r).replace(/(\.\d)0$/,'$1');
}
const FR=[[0,''],[0.125,'\u215B'],[0.25,'\u00BC'],[0.333,'\u2153'],[0.375,'\u215C'],[0.5,'\u00BD'],[0.625,'\u215D'],[0.667,'\u2154'],[0.75,'\u00BE'],[0.875,'\u215E'],[1,'']];
function fmtFraction(n){
  const whole=Math.floor(n+1e-9); let frac=n-whole;
  let best=FR[0],bd=1e9;
  for(const f of FR){const d=Math.abs(frac-f[0]);if(d<bd){bd=d;best=f}}
  if(best[0]===1)return String(whole+1);
  if(bd>0.05)return fmtNum(n);
  if(whole===0&&best[1]==='')return '0';
  return (whole? whole+(best[1]?' ':'') :'')+best[1];
}
function displayAmount(ing,recipe,factor,metric){
  if(ing.amount==null) return {main:ing.amount_original||'', sub:''};
  let amt=ing.scalable!==false? ing.amount*factor : ing.amount;
  if(ing.unit==='whole'&&/\u86CB|egg/i.test(ing.name_original||'')) amt=Math.round(amt*2)/2;
  const u=ing.unit;
  if(u==='cup'||u==='tsp'||u==='tbsp'){
    const per = u==='cup' ? (CUP_ML[recipe.cup_standard]||240) : UNIT_ML[u];
    const ml=amt*per;
    const nat=fmtFraction(amt)+' '+u;
    const met=fmtNum(ml)+' ml';
    return metric? {main:met, sub:nat} : {main:nat, sub:met};
  }
  if(u==='g'||u==='ml') return {main:fmtNum(amt)+' '+u, sub:''};
  if(u==='whole') return {main:fmtNum(amt), sub:''};
  if(u==='pinch') return {main:(amt>1?fmtNum(amt)+' ':'')+'pinch', sub:''};
  return {main:fmtNum(amt)+' '+(u||''), sub:''};
}

/* ================= pan math (Bakevert area method) ================= */
const IN=2.54;
function panArea(p){
  if(!p)return null;
  if(p.shape==='round'&&p.d)   return Math.PI*Math.pow(p.d/2,2);
  if(p.shape==='square'&&p.d)  return p.d*p.d;
  if(p.shape==='rectangle'&&p.l&&p.w) return p.l*p.w;
  return null;
}
function toCm(v,unit){return unit==='inch'? v*IN : v}
function moldToPan(m){
  if(!m)return null;
  const u=m.size_unit||'inch';
  if(m.shape==='round'||m.shape==='square') return {shape:m.shape,d:toCm(m.diameter_or_width,u)};
  if(m.shape==='rectangle') return {shape:'rectangle',l:toCm(m.length,u),w:toCm(m.diameter_or_width,u)};
  return null;
}

  return m.layers>1? `${m.diameter_or_width} ${u}, ${m.layers} layers` : base;
}

function panSVG(p,color,label){
  const max=52, scaleRef=34;
  if(!p||!panArea(p))return `<svg width="60" height="60"></svg>`;
  const px=v=>Math.max(16,Math.min(max,v/scaleRef*max));
  const lab=label?`<text x="30" y="34" text-anchor="middle" font-size="10" fill="${color}" font-family="inherit">${label}</text>`:'';
  if(p.shape==='round'){const d=px(p.d);return `<svg width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="${d/2}" fill="none" stroke="${color}" stroke-width="2"/>${lab}</svg>`}
  if(p.shape==='square'){const s=px(p.d);return `<svg width="60" height="60" viewBox="0 0 60 60"><rect x="${30-s/2}" y="${30-s/2}" width="${s}" height="${s}" rx="3" fill="none" stroke="${color}" stroke-width="2"/>${lab}</svg>`}
  const l=px(p.l),w=px(p.w);
  return `<svg width="68" height="60" viewBox="0 0 68 60"><rect x="${34-l/2}" y="${30-w/2}" width="${l}" height="${w}" rx="3" fill="none" stroke="${color}" stroke-width="2"/>${label?`<text x="34" y="34" text-anchor="middle" font-size="10" fill="${color}">${label}</text>`:''}</svg>`;
}
function panLabel(m){ if(!m)return''; return m.shape==='rectangle'? '' : `${m.diameter_or_width}${m.size_unit==='inch'?'"':''}` }
function converterBlock(r,st,factor){
  const orig=moldToPan(r.mold);
  if(!orig)return `<section class="sec"><h2>Pan converter</h2><p class="hint">This recipe has no pan dimensions to convert from.</p></section>`;
  const shape=st.shape||orig.shape, unit=st.unit||r.mold.size_unit||'inch';
  const target=st.applied? {shape:st.shape,d:toCm(+st.d||0,st.unit),l:toCm(+st.l||0,st.unit),w:toCm(+st.w||0,st.unit)}:null;
  const targetLabel=st.applied? (st.shape==='rectangle'? '' : `${st.d}${st.unit==='inch'?'"':''}`):'';
  const dims= shape==='rectangle'
    ? `<div class="fld"><label for="cv-l">Length</label><input type="number" inputmode="decimal" id="cv-l" value="${st.l??''}" placeholder="13"></div>
       <div class="fld"><label for="cv-w">Width</label><input type="number" inputmode="decimal" id="cv-w" value="${st.w??''}" placeholder="9"></div>`
    : `<div class="fld"><label for="cv-d">${shape==='round'?'Diameter':'Side'}</label><input type="number" inputmode="decimal" id="cv-d" value="${st.d??''}" placeholder="8"></div>
       <div class="fld"></div>`;
  return `<section class="sec"><h2>Pan converter <span class="hint" style="margin:0">Bakevert area method</span></h2>
    <div class="conv">
      <div class="panviz">
        ${panSVG(orig,'#17150F',panLabel(r.mold))}
        <div class="ratio"><div class="n">\u00D7${factor===1?'1.00':factor.toFixed(2)}</div><div class="l">ratio</div></div>
        ${panSVG(target||orig,'#E8600A',st.applied?targetLabel:panLabel(r.mold))}
      </div>
      <div class="cgrid">
        <div class="fld"><label for="cv-shape">Target shape</label>
          <select id="cv-shape" onchange="convState['${r.id}'].shape=this.value;convState['${r.id}'].applied=false;render()">
            <option value="round" ${shape==='round'?'selected':''}>Round</option>
            <option value="square" ${shape==='square'?'selected':''}>Square</option>
            <option value="rectangle" ${shape==='rectangle'?'selected':''}>Rectangle</option>
          </select></div>
        <div class="fld"><label for="cv-unit">Unit</label>
          <select id="cv-unit"><option value="inch" ${unit==='inch'?'selected':''}>inch</option><option value="cm" ${unit==='cm'?'selected':''}>cm</option></select></div>
        ${dims}
        <div class="fld" style="grid-column:1/3"><label for="cv-mat">Target material</label>
          <select id="cv-mat">${Object.entries(MAT_LABEL).map(([k,v])=>`<option value="${k}" ${st.material===k?'selected':''}>${v}</option>`).join('')}</select></div>
        <button class="cbtn" onclick="applyConvert('${r.id}','${shape}')">Convert</button>
      </div>
      ${st.applied?`<button class="textbtn" onclick="convState['${r.id}'].applied=false;render()">Reset to original amounts</button>`:''}
      ${st.applied?advisor(r,factor,st):''}
    </div>
  </section>`;
}
function applyConvert(id,shape){
  const st=convState[id];
  st.shape=shape; st.unit=document.getElementById('cv-unit').value;
  st.material=document.getElementById('cv-mat').value;
  if(shape==='rectangle'){st.l=document.getElementById('cv-l').value;st.w=document.getElementById('cv-w').value;
    if(!+st.l||!+st.w){alert('Please enter length and width.');return}}
  else {st.d=document.getElementById('cv-d').value; if(!+st.d){alert('Please enter the pan size.');return}}
  st.applied=true; render();
  document.getElementById('ings')?.scrollIntoView({behavior:'smooth',block:'start'});
}
function advisor(r,factor,st){
  const tips=[];
  const om=r.mold?.material||'unknown', tm=st.material;
  tips.push(`Ingredients scaled by area ratio \u00D7${factor.toFixed(2)}. Batter depth stays the same as the original, so <b>keep the original oven temperature</b> and adjust time slightly.`);
  if(om!==tm&&tm!=='unknown'&&om!=='unknown'){
    if(tm==='glass')tips.push('Metal to glass: glass heats slowly and holds heat. <b>Add 10 to 15% baking time.</b>');
    if(tm==='metal-dark'&&om!=='metal-dark')tips.push('Switching to dark metal: it absorbs heat faster. <b>Reduce time by 5 to 10%</b> and watch the bottom.');
    if(om==='metal-dark'&&(tm==='metal-light'||tm==='mousse-ring'))tips.push('Dark to light metal or mousse ring: time may increase slightly. Check often.');
  }
  tips.push('The <b>toothpick test</b> is the final judge: it should come out clean from the center.');
  return `<div class="adv"><b>Adjustment advice</b><ul>${tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    <a href="https://www.bakevert.com/blog/adjusting-baking-time-temperature-guide" target="_blank" rel="noopener">Full guide: Bakevert time and temperature adjustments</a></div>`;
}

}
function pickStar(n){starTmp=n;
  document.querySelectorAll('#starpick span').forEach(s=>s.classList.toggle('lit',+s.dataset.n<=n));}
function computeFactor(id){
  const r=allRecipes().find(x=>x.id===id), st=convState[id];
  if(!st?.applied)return 1;
  const a0=panArea(moldToPan(r.mold));
  const a1=panArea({shape:st.shape,d:toCm(+st.d||0,st.unit),l:toCm(+st.l||0,st.unit),w:toCm(+st.w||0,st.unit)});
  return a0&&a1? a1/a0 : 1;
}
function addLog(id){
  const entry={date:document.getElementById('lg-date').value,
    mold_used:document.getElementById('lg-mold').value.trim(),
    scale_factor:+computeFactor(id).toFixed(2),
    rating:starTmp||null,
    changes_made:document.getElementById('lg-changes').value.trim(),
    went_well:document.getElementById('lg-well').value.trim(),
    to_improve:document.getElementById('lg-improve').value.trim()};
  if(!entry.went_well&&!entry.to_improve&&!entry.changes_made&&!entry.rating){alert('Add a rating or a note before saving.');return}
  (bakeLogs[id]=bakeLogs[id]||[]).push(entry); save(LS_LOGS,bakeLogs); starTmp=0; render();
}
function delLog(id,i){if(!confirm('Delete this entry?'))return;bakeLogs[id].splice(i,1);save(LS_LOGS,bakeLogs);render()}
function deleteRecipe(id){if(!confirm('Delete this recipe? Its bake log and saved photos will also be removed.'))return;
  userRecipes=userRecipes.filter(r=>r.id!==id);save(LS_RECIPES,userRecipes);
  delete bakeLogs[id];save(LS_LOGS,bakeLogs);
  Object.keys(photos).filter(k=>k.startsWith(id+'|')).forEach(k=>delete photos[k]);save(LS_PHOTOS,photos);
  go('#/')}

/* ================= add view ================= */
const AI_PROMPT=`You are converting a baking recipe into structured JSON for my personal recipe app.
Follow "Recipe Conversion Standard v1" exactly.

Critical rules:
- Keep ALL ingredient names and step text in the ORIGINAL language and wording, including bilingual lines. Do not translate, do not paraphrase.
- Parse amounts/units into fields but always keep the *_original text.
- Use null for anything not stated. Do not invent data.
- Extract actionable tips from comments/reviews; tag topic and affects_categories.
- bake_log must be an empty array [].
- Output only the raw JSON object, nothing else.

Schema fields: id, title{original,alt}, language, source{url,site,author}, video{youtube_url}, categories[], servings{original_text,amount,unit}, times_minutes{prep,cook,bake,additional,total,original_text}, temperature{value,unit,original_text}, mold{original_text,shape,diameter_or_width,length,height,size_unit,layers,count,material,inferred_from_photo,lining}, cup_standard, ingredient_groups[{group_name,ingredients[{name_original,amount,unit,amount_original,note,scalable}]}], steps[{n,text_original,photo_url}], photos{cover_url,doneness[]}, tips[{text_original,source,author,topic,affects_categories}], notes_original, bake_log.
Units allowed: g, ml, cup, tbsp, tsp, whole, pinch, null. Categories: sponge-cake, cookies, chocolate-cake, buttercream, chiffon-cake, cupcakes.
Cup standard: US=240ml, UK=250ml, TW-rice-cup=180ml.

Source URL: <paste URL>
Cup standard hint: <US / UK / TW-rice-cup / unknown>

Recipe content:
<paste article text or MarkItDown/downsub output>

Comments/Q&A (optional):
<paste comments>`;
function addView(){
  return `
  <h1 class="rtitle" style="margin-top:22px">Add recipe</h1>
  <section class="sec"><h2>Paste recipe JSON</h2>
    <p class="hint">Give the recipe page text (or MarkItDown or subtitle output) to Claude together with the prompt below, then paste the returned JSON here.</p>
    <textarea class="mono-ta" id="add-json" placeholder='{"id": "...", "title": {...}}'></textarea>
    <div id="add-msg"></div>
    <button class="btn accent" onclick="importJSON()">Import</button>
    <details class="protocol"><summary>AI conversion prompt (tap to open and copy)</summary>
      <pre class="tpl" id="tpl">${esc(AI_PROMPT)}</pre>
      <button class="btn ghost" onclick="navigator.clipboard.writeText(document.getElementById('tpl').textContent).then(()=>this.textContent='Copied')">Copy prompt</button>
    </details>
  </section>
  <section class="sec"><h2>About photos</h2>
    <p class="hint">The JSON can carry photo links from the source site in three places: <b>photos.cover_url</b> for the card and header, <b>steps[].photo_url</b> for a photo under a step, and <b>photos.doneness[]</b> for extra reference shots. The app tries to load them, but many sites block images from other domains, and links break when a site changes.</p>
    <p class="hint">So after importing, open the recipe and tap <b>Add photo</b> on the header or any step to save your own image from your camera roll. Saved photos live on this device, take priority over the original link, and are included in your backup file. This is the reliable way to keep doneness photos.</p>
  </section>`;
}
function importJSON(){
  const msg=document.getElementById('add-msg');
  let obj;
  try{ obj=JSON.parse(document.getElementById('add-json').value.replace(/^```json|```$/g,'').trim()); }
  catch(e){ msg.innerHTML=`<p class="errmsg">Could not parse JSON: ${esc(e.message)}</p>`; return; }
  const errs=[];
  if(!obj.id)errs.push('missing id');
  if(!obj.title?.original)errs.push('missing title.original');
  if(!Array.isArray(obj.ingredient_groups)||!obj.ingredient_groups.length)errs.push('missing ingredient_groups');
  if(!Array.isArray(obj.steps)||!obj.steps.length)errs.push('missing steps');
  if(errs.length){msg.innerHTML=`<p class="errmsg">Format problems: ${errs.join(', ')}.</p>`;return;}
  obj.bake_log=[];
  const i=userRecipes.findIndex(r=>r.id===obj.id);
  if(i>=0){ if(!confirm('A recipe with this id already exists. Replace it?'))return; userRecipes[i]=obj; }
  else userRecipes.unshift(obj);
  save(LS_RECIPES,userRecipes);
  msg.innerHTML=`<p class="okmsg">Imported: ${esc(obj.title.original)}</p>`;
  setTimeout(()=>go('#/r/'+obj.id),500);
}

/* ================= backup view ================= */
function backupView(){
  const n=Object.keys(photos).length, used=photoBytes();
  return `
  <h1 class="rtitle" style="margin-top:22px">Backup and restore</h1>
  <section class="sec"><h2>Export</h2>
    <p class="hint">Downloads a JSON file with the recipes you added, all bake log entries, and every photo you saved. Back up regularly, for example to iCloud or a private GitHub repository.</p>
    <button class="btn" onclick="exportAll()">Download backup</button></section>
  <section class="sec"><h2>Restore</h2>
    <p class="hint">Choose an earlier backup file. Recipes with the same id are replaced, bake logs are merged, and photos are restored. This is also how you move your data between phone and laptop.</p>
    <input type="file" accept=".json,application/json" onchange="importAll(this)"></section>
  <section class="sec"><h2>Photo storage</h2>
    <p class="hint">${n} photo${n===1?'':'s'} saved on this device, about ${fmtBytes(used)}. Photos are compressed to 1200 px before saving. Browser storage is limited, so if saving starts to fail, export a backup and remove photos you no longer need.</p>
    <div class="meter"><div style="width:${Math.min(100,used/5242880*100).toFixed(1)}%"></div></div>
    <p class="hint">Rough guide against a typical 5 MB budget.</p></section>
  <section class="sec"><h2>Where is my data</h2>
    <p class="hint">Everything is stored in this device's browser storage. It is private and never uploaded. Installing the app to your Home Screen makes the storage more durable, but clearing Safari website data will still erase it, so keep backups.</p></section>`;
}
function exportAll(){
  const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),userRecipes,bakeLogs,photos},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='bakebook-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importAll(input){
  const f=input.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{
    const d=JSON.parse(rd.result);
    (d.userRecipes||[]).forEach(r=>{const i=userRecipes.findIndex(x=>x.id===r.id); i>=0?userRecipes[i]=r:userRecipes.push(r);});
    Object.entries(d.bakeLogs||{}).forEach(([id,logs])=>{bakeLogs[id]=[...(bakeLogs[id]||[]),...logs];});
    Object.assign(photos,d.photos||{});
    save(LS_RECIPES,userRecipes);save(LS_LOGS,bakeLogs);save(LS_PHOTOS,photos);
    alert('Restore complete.');go('#/');
  }catch(e){alert('Could not read the file: '+e.message)}};
  rd.readAsText(f);
}

/* ================= router ================= */
function render(){
  const h=location.hash||'#/';
  const v=document.getElementById('view');
  let name='home';
  if(h.startsWith('#/r/')){v.innerHTML=detailView(decodeURIComponent(h.slice(4)));name='';}
  else if(h==='#/add'){v.innerHTML=addView();name='add';}
  else if(h==='#/backup'){v.innerHTML=backupView();name='backup';}
  else v.innerHTML=listView();
  ['home','add','backup'].forEach(n=>document.getElementById('nav-'+n).classList.toggle('on',n===name));
  if(render._last!==h) window.scrollTo(0,0);
  render._last=h;
}
render();
if('serviceWorker' in navigator&&location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
